  - python3 setup.py build -j${FLATPAK_BUILDER_N_JOBS} -DARCHIVE_DOWNLOAD_DIR="${FLATPAK_BUILDER_BUILDDIR}"
  - pip3 install --no-index --no-build-isolation --prefix="${FLATPAK_DEST}" .
  build-options:
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  cleanup: ['*']
