  - /lib/kernel
  - /lib/modprobe.d
  - /lib/rpm
  - /lib/sysctl.d
      # - /lib/systemd
  - /lib/udev
  - /app/share/doc
  - /share/dbus-1
  - /share/doc
  - /share/factory
  - /share/glib-2.0
  - /share/icons
  - /share/man
  - /share/pkgconfig
  - /share/polkit-1
